openapi: 3.1.0
info:
  title: Daemon ↔ Railway Internal REST API
  version: 0.1.0
  description: >
    Internal REST endpoints called by the training daemon against the Railway
    backend. All endpoints require HTTP Basic Auth (HOST_USERNAME / HOST_PASSWORD).
    This spec is separate from the host/participant-facing API (docs/openapi.yaml).
paths:
  /api/session/active:
    get:
      tags:
      - session
      summary: Get Active Session ID
      description: >
        Daemon calls on startup to discover if a session is already active on
        Railway. Returns the current session_id or null if no session is active.
      operationId: get_active_session_id
      security:
      - basicAuth: []
      responses:
        '200':
          description: Active session info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveSessionResponse'
      x-feature: session_management
  /api/session/start:
    post:
      tags:
      - session
      summary: Generate a new session_id (test bootstrap)
      description: >
        Used by hermetic test setup when the daemon is not running.
        Generates a fresh session_id on Railway directly. Production sessions
        are created on the daemon, not here.
      operationId: session_start
      security:
      - basicAuth: []
      responses:
        '200':
          description: Generated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStartResponse'
      x-feature: session_management
  /api/slides/upload:
    post:
      tags:
      - slides
      summary: Upload a slide PDF directly to Railway
      description: >
        Multipart upload (file + optional slug + optional name) used by the
        host UI to add a slide deck without going through Google Drive. Stored
        in the runtime "uploaded slides" directory and broadcast via
        decks_updated.
      operationId: upload_slide_pdf
      security:
      - basicAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadSlidePdfRequest'
      responses:
        '200':
          description: Upload accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadSlidePdfResponse'
        '400':
          description: Bad request (non-PDF, empty body, etc.)
      x-feature: slides
  /api/slides/refresh/{slug}:
    post:
      tags:
      - slides
      summary: Refresh slide PDF cache from Google Drive
      description: >
        Unified entry point for both the participant cache-miss path and the
        daemon's PPTX-watcher path. Marks the slug stale, deletes the old
        cached PDF, downloads from Drive, and returns the new SHA256.
        Per-slug deduplication: parallel calls for the same slug share one
        in-flight fetch. The daemon receives a slide_log "completed" event
        over WS and broadcasts decks_updated to participants.
      operationId: refresh_slide
      security:
      - basicAuth: []
      parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: URL-safe identifier for the slide deck.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshSlideRequest'
      responses:
        '200':
          description: PDF cached successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshSlideResponse'
        '422':
          description: drive_export_url missing or invalid
        '502':
          description: Google Drive download failed
      x-feature: slides
  /api/{session_id}/upload/{file_id}:
    get:
      tags:
      - upload
      summary: Download Uploaded File
      description: >
        Daemon downloads a participant-uploaded file from Railway's temporary
        storage. Called after Railway notifies the daemon via WebSocket that a
        new file is ready for download.
      operationId: download_uploaded_file
      security:
      - basicAuth: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: file_id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID assigned to the uploaded file by Railway.
      responses:
        '200':
          description: Raw file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: File not found or content missing
      x-feature: paste_upload
  /api/{session_id}/upload/{file_id}/ack:
    post:
      tags:
      - upload
      summary: Acknowledge File Download
      description: >
        Daemon confirms it has downloaded and persisted the file to local disk.
        Railway deletes its temporary copy upon receiving this acknowledgement.
      operationId: ack_file_download
      security:
      - basicAuth: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
      - name: file_id
        in: path
        required: true
        schema:
          type: integer
        description: Numeric ID of the file being acknowledged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileDownloadAck'
      responses:
        '200':
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '404':
          description: File not found
      x-feature: paste_upload
  /internal/upload-static:
    post:
      tags:
      - infrastructure
      summary: Upload a static asset to Railway
      description: >
        Daemon pushes a static file (HTML/JS/CSS/etc.) into Railway's static/
        directory so the latest UI can serve from production without a full
        Railway redeploy. Path is validated against an allow-list of file
        extensions and traversal-safe.
      operationId: upload_static
      security:
      - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadStaticRequest'
      responses:
        '200':
          description: File written
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadStaticResponse'
        '400':
          description: Invalid path / extension / oversized payload
      x-feature: infrastructure
  /internal/delete-static:
    post:
      tags:
      - infrastructure
      summary: Delete a static asset from Railway
      description: >
        Counterpart to /internal/upload-static. Used by the daemon to remove
        files no longer in the source tree.
      operationId: delete_static
      security:
      - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteStaticRequest'
      responses:
        '200':
          description: File deleted (or already absent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteStaticResponse'
        '400':
          description: Invalid path / extension
      x-feature: infrastructure
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: >
        HTTP Basic Auth using HOST_USERNAME and HOST_PASSWORD from
        ~/.training-assistants-secrets.env.
  schemas:
    ActiveSessionResponse:
      type: object
      properties:
        session_id:
          type:
          - string
          - 'null'
          description: Current active session ID, or null if no session is active.
      required:
      - session_id
    RefreshSlideRequest:
      type: object
      properties:
        drive_export_url:
          type: string
          description: Google Drive PDF export URL for the slide deck.
      required:
      - drive_export_url
    RefreshSlideResponse:
      type: object
      properties:
        status:
          type: string
          description: Always "cached" on success.
        sha256:
          type: string
          description: SHA-256 hex digest of the cached PDF file.
        size:
          type: integer
          description: File size in bytes.
      required:
      - status
      - sha256
      - size
    FileDownloadAck:
      type: object
      properties:
        disk_path:
          type: string
          description: Absolute local path where the daemon saved the file.
      required:
      - disk_path
    SessionStartResponse:
      type: object
      properties:
        session_id:
          type: string
      required:
      - session_id
    UploadSlidePdfRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: PDF file to upload.
        slug:
          type: string
          description: Optional slug; derived from filename when omitted.
        name:
          type: string
          description: Optional display name; derived from filename when omitted.
      required:
      - file
    UploadSlidePdfResponse:
      type: object
      properties:
        ok:
          type: boolean
        slide:
          type: object
          description: Resulting slide entry (slug, name, url, updated_at, source).
      required:
      - ok
      - slide
    UploadStaticRequest:
      type: object
      properties:
        path:
          type: string
          description: Path under static/ where the file should be written.
        content_b64:
          type: string
          description: Base64-encoded file content (max 20MB decoded).
      required:
      - path
      - content_b64
    UploadStaticResponse:
      type: object
      properties:
        status:
          type: string
        path:
          type: string
        size:
          type: integer
      required:
      - status
      - path
      - size
    DeleteStaticRequest:
      type: object
      properties:
        path:
          type: string
      required:
      - path
    DeleteStaticResponse:
      type: object
      properties:
        status:
          type: string
        action:
          type: string
          description: '"deleted" or "not_found".'
      required:
      - status
      - action
