openapi: 3.1.0
info:
  title: Daemon Host Panel
  version: 0.1.0
paths:
  /api/participant/rejoin:
    post:
      tags:
      - participant
      summary: Rejoin Participant
      description: Lookup-only identity restore for returning UUIDs in current session.
      operationId: rejoin_participant_api_participant_rejoin_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
      x-feature: identity
  /api/participant/register:
    post:
      tags:
      - participant
      summary: Register Participant
      description: Register participant — assign name+avatar. Idempotent for returning
        participants.
      operationId: register_participant_api_participant_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
      x-feature: identity
  /api/participant/name:
    put:
      tags:
      - participant
      summary: Rename Participant
      description: Rename a registered participant. Returns 400 if not yet registered.
      operationId: rename_participant_api_participant_name_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: identity
  /api/participant/roll-avatar:
    post:
      tags:
      - participant
      summary: Roll Avatar Endpoint
      description: Re-roll avatar (conference mode only).
      operationId: roll_avatar_endpoint_api_participant_roll_avatar_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarResponse'
      x-feature: identity
  /api/participant/location:
    put:
      tags:
      - participant
      summary: Set Location
      description: Store participant city/timezone.
      operationId: set_location_api_participant_location_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: identity
  /api/participant/state:
    get:
      tags:
      - participant
      summary: Get Participant State
      description: Return full personalised state for a participant — used on page
        load and WS reconnect.
      operationId: get_participant_state_api_participant_state_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParticipantStateResponse'
      x-feature: participant_state
      x-doc-notes:
      - Returns participant-personalized full state snapshot.
  /api/participant/git-activity:
    get:
      tags:
      - participant
      summary: Get Git Activity
      description: Return accumulated git file-open activity for the current session.
      operationId: get_git_activity_api_participant_git_activity_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitActivityResponse'
      x-feature: activity
  /api/{session_id}/host/participants/resolve-locations:
    post:
      tags:
      - participant
      summary: Resolve Participant Locations
      description: Backfill city name + timezone + country for all participants missing
        geo metadata.
      operationId: resolve_participant_locations_api__session_id__host_participants_resolve_locations_post
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '204':
          description: Successful Response
      x-feature: identity
  /api/participant/wordcloud/word:
    post:
      tags:
      - wordcloud
      summary: Submit Word
      description: Participant submits a word to the word cloud.
      operationId: submit_word_api_participant_wordcloud_word_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitWordBody'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: wordcloud
  /api/{session_id}/host/wordcloud/word:
    post:
      tags:
      - wordcloud
      summary: Host Submit Word
      description: Host submits a word — same as participant but no scoring.
      operationId: host_submit_word_api__session_id__host_wordcloud_word_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitWordBody'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: wordcloud
  /api/{session_id}/host/wordcloud/topic:
    post:
      tags:
      - wordcloud
      summary: Set Topic
      description: Host sets the word cloud topic.
      operationId: set_topic_api__session_id__host_wordcloud_topic_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTopicBody'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: wordcloud
  /api/{session_id}/host/wordcloud/clear:
    post:
      tags:
      - wordcloud
      summary: Clear Wordcloud
      description: Host clears the word cloud.
      operationId: clear_wordcloud_api__session_id__host_wordcloud_clear_post
      responses:
        '204':
          description: Successful Response
      x-feature: wordcloud
  /api/participant/emoji/reaction:
    post:
      tags:
      - emoji
      summary: Emoji Reaction
      description: Participant sends an emoji reaction.
      operationId: emoji_reaction_api_participant_emoji_reaction_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmojiReactionRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: emoji
  /api/participant/qa/submit:
    post:
      tags:
      - qa
      summary: Submit Question
      description: Participant submits a Q&A question.
      operationId: submit_question_api_participant_qa_submit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitQuestionBody'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: qa
  /api/participant/qa/upvote:
    post:
      tags:
      - qa
      summary: Upvote Question
      description: Participant upvotes a Q&A question.
      operationId: upvote_question_api_participant_qa_upvote_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpvoteQuestionBody'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: qa
  /api/{session_id}/host/qa/submit:
    post:
      tags:
      - qa
      summary: Host Submit Question
      description: Host submits a Q&A question — no scoring.
      operationId: host_submit_question_api__session_id__host_qa_submit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitQuestionBody'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: qa
  /api/{session_id}/host/qa/question/{question_id}/text:
    put:
      tags:
      - qa
      summary: Edit Question Text
      description: Host edits a question's text.
      operationId: edit_question_text_api__session_id__host_qa_question__question_id__text_put
      parameters:
      - name: question_id
        in: path
        required: true
        schema:
          type: string
          title: Question Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditQuestionTextBody'
      responses:
        '204':
          description: Successful Response
      x-feature: qa
  /api/{session_id}/host/qa/question/{question_id}:
    delete:
      tags:
      - qa
      summary: Delete Question
      description: Host deletes a question.
      operationId: delete_question_api__session_id__host_qa_question__question_id__delete
      parameters:
      - name: question_id
        in: path
        required: true
        schema:
          type: string
          title: Question Id
      responses:
        '204':
          description: Successful Response
      x-feature: qa
  /api/{session_id}/host/qa/question/{question_id}/answered:
    put:
      tags:
      - qa
      summary: Toggle Answered
      description: Host toggles a question's answered flag.
      operationId: toggle_answered_api__session_id__host_qa_question__question_id__answered_put
      parameters:
      - name: question_id
        in: path
        required: true
        schema:
          type: string
          title: Question Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleAnsweredBody'
      responses:
        '204':
          description: Successful Response
      x-feature: qa
  /api/{session_id}/host/qa/clear:
    post:
      tags:
      - qa
      summary: Clear Qa
      description: Host clears all Q&A questions.
      operationId: clear_qa_api__session_id__host_qa_clear_post
      responses:
        '204':
          description: Successful Response
      x-feature: qa
  /api/participant/poll/vote:
    post:
      tags:
      - poll
      summary: Cast Vote
      description: Participant casts a vote.
      operationId: cast_vote_api_participant_poll_vote_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: poll
      x-doc-notes:
      - Votes are final once submitted; re-vote is rejected.
  /api/{session_id}/host/poll/manual/submit:
    post:
      tags:
      - poll
      summary: Create Poll
      description: Host manually creates and immediately opens a new poll.
      operationId: create_poll_api__session_id__host_poll_manual_submit_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePollRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: poll
  /api/{session_id}/host/poll/end:
    post:
      tags:
      - poll
      summary: End Poll
      description: Host ends the poll.
      operationId: end_poll_api__session_id__host_poll_end_post
      responses:
        '204':
          description: Successful Response
      x-feature: poll
  /api/{session_id}/host/poll/correct:
    put:
      tags:
      - poll
      summary: Reveal Correct
      description: Host reveals correct answers and awards scores.
      operationId: reveal_correct_api__session_id__host_poll_correct_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevealCorrectRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: poll
  /api/{session_id}/host/poll/end/timer:
    post:
      tags:
      - poll
      summary: Start Timer
      description: Host starts a countdown timer to end the poll.
      operationId: start_timer_api__session_id__host_poll_end_timer_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTimerRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: poll
  /api/{session_id}/host/poll:
    get:
      tags:
      - poll
      summary: Get Poll State
      description: Return full poll state for host poll tab.
      operationId: get_poll_state_api__session_id__host_poll_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostPollStateResponse'
      x-feature: poll
    delete:
      tags:
      - poll
      summary: Delete Poll
      description: Host deletes the current poll.
      operationId: delete_poll_api__session_id__host_poll_delete
      responses:
        '204':
          description: Successful Response
      x-feature: poll
  /api/{session_id}/host/leaderboard/show:
    post:
      tags:
      - leaderboard
      summary: Show Leaderboard
      operationId: show_leaderboard_api__session_id__host_leaderboard_show_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowLeaderboardResponse'
      x-feature: scores_leaderboard
  /api/{session_id}/host/scores:
    delete:
      tags:
      - leaderboard
      summary: Reset Scores
      operationId: reset_scores_api__session_id__host_scores_delete
      responses:
        '204':
          description: Successful Response
      x-feature: scores_leaderboard
  /api/participant/paste:
    post:
      tags:
      - misc
      summary: Paste Text
      description: Participant pastes text to be seen by host.
      operationId: paste_text_api_participant_paste_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasteRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: paste_upload
  /api/participant/misc/feedback:
    post:
      tags:
      - misc
      summary: Participant Feedback
      description: Participant feedback submitted from floating feedback modal.
      operationId: participant_feedback_api_participant_misc_feedback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: feedback
  /api/participant/notes:
    get:
      tags:
      - misc
      summary: Get Notes
      description: Get session notes content.
      operationId: get_notes_api_participant_notes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotesResponse'
      x-feature: notes_summary
  /api/participant/summary:
    get:
      tags:
      - misc
      summary: Get Summary
      description: Get summary points and raw markdown.
      operationId: get_summary_api_participant_summary_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
      x-feature: notes_summary
  /api/participant/slides/decks:
    get:
      tags:
      - misc
      summary: Get Slides Decks
      description: Get slides cache status for all known decks; called on initial
        page load (decks_updated WS carries full data and replaces polling).
      operationId: get_slides_decks_api_participant_slides_decks_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecksResponse'
      x-feature: slides
      x-doc-notes:
      - Returns cache status snapshot for all known decks on initial page load; decks_updated
        WS carries full data so no re-polling needed.
  /api/participant/slides/history:
    get:
      tags:
      - misc
      summary: Get Slides History
      description: Return accumulated slide viewing history for the current session.
      operationId: get_slides_history_api_participant_slides_history_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlidesHistoryResponse'
      x-feature: slides
  /api/participant/agenda:
    get:
      tags:
      - misc
      summary: Get Agenda
      description: Serve the agenda .docx as base64-encoded JSON (survives WS proxy).
      operationId: get_agenda_api_participant_agenda_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaResponse'
      x-feature: notes_summary
  /api/{session_id}/host/pastes:
    get:
      tags:
      - misc
      summary: Get Pastes
      description: Return all pending paste entries grouped by participant uuid.
      operationId: get_pastes_api__session_id__host_pastes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PastsResponse'
      x-feature: paste_upload
  /api/{session_id}/host/notes:
    get:
      tags:
      - misc
      summary: Get Host Notes
      description: Return current session notes content.
      operationId: get_host_notes_api__session_id__host_notes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotesResponse'
      x-feature: notes_summary
  /api/{session_id}/host/summary:
    get:
      tags:
      - misc
      summary: Get Host Summary
      description: Return summary points, raw markdown, and updated_at timestamp.
      operationId: get_host_summary_api__session_id__host_summary_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SummaryResponse'
      x-feature: notes_summary
  /api/{session_id}/host/uploads/seen:
    post:
      tags:
      - misc
      summary: Mark Uploaded File Seen
      description: Mark an uploaded-file indicator as seen by host in daemon session
        state.
      operationId: mark_uploaded_file_seen_api__session_id__host_uploads_seen_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadSeenRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: paste_upload
  /api/{session_id}/host/slides-compilation:
    get:
      tags:
      - misc
      summary: Get Slides Compilation
      description: 'Compile all viewed slide pages into one PDF and return as a download.


        Long-running: may trigger Railway to download PDFs from Google Drive first.

        Progress is logged to the daemon log.'
      operationId: get_slides_compilation_api__session_id__host_slides_compilation_get
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      x-feature: slides
  /api/{session_id}/host/poll/queue:
    post:
      tags:
      - poll
      summary: Submit Questions
      description: Replace the entire poll queue with the submitted questions.
      operationId: submit_questions_api__session_id__host_poll_queue_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitQuestionsRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: poll
    delete:
      tags:
      - poll
      summary: Clear Queue
      description: Clear the entire quiz queue.
      operationId: clear_queue_api__session_id__host_poll_queue_delete
      responses:
        '204':
          description: Successful Response
      x-feature: poll
  /api/{session_id}/host/poll/queue/{index}:
    delete:
      tags:
      - poll
      summary: Remove From Queue
      description: Remove the question at the given 0-based index from the queue.
      operationId: remove_from_queue_api__session_id__host_poll_queue__index__delete
      parameters:
      - name: index
        in: path
        required: true
        schema:
          type: integer
          title: Index
      responses:
        '204':
          description: Successful Response
      x-feature: poll
  /api/participant/codereview/selection:
    put:
      tags:
      - codereview
      summary: Update Selection
      description: Participant sets their selected lines (full replacement).
      operationId: update_selection_api_participant_codereview_selection_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectionRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: codereview
  /api/{session_id}/host/codereview:
    post:
      tags:
      - codereview
      summary: Create Codereview
      description: Host creates a code review session.
      operationId: create_codereview_api__session_id__host_codereview_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCodeReviewRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: codereview
    delete:
      tags:
      - codereview
      summary: Clear Codereview
      description: Host clears the code review.
      operationId: clear_codereview_api__session_id__host_codereview_delete
      responses:
        '204':
          description: Successful Response
      x-feature: codereview
  /api/{session_id}/host/codereview/status:
    put:
      tags:
      - codereview
      summary: Set Codereview Status
      description: Host closes the selection phase.
      operationId: set_codereview_status_api__session_id__host_codereview_status_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetCodeReviewStatusRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkWithPhaseResponse'
      x-feature: codereview
  /api/{session_id}/host/codereview/confirm-line:
    put:
      tags:
      - codereview
      summary: Confirm Line
      description: Host confirms a line as problematic and awards points.
      operationId: confirm_line_api__session_id__host_codereview_confirm_line_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmLineRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmLineResponse'
      x-feature: codereview
  /api/{session_id}/host/activity:
    put:
      tags:
      - activity
      summary: Set Activity
      description: Host switches the current activity.
      operationId: set_activity_api__session_id__host_activity_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetActivityRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetActivityResponse'
      x-feature: activity
    post:
      tags:
      - activity
      summary: Set Activity
      description: Host switches the current activity.
      operationId: set_activity_api__session_id__host_activity_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetActivityRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetActivityResponse'
      x-feature: activity
  /api/participant/debate/pick-side:
    post:
      tags:
      - debate
      summary: Pick Side
      description: Participant picks a side (for/against).
      operationId: pick_side_api_participant_debate_pick_side_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PickSideRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: debate
  /api/participant/debate/argument:
    post:
      tags:
      - debate
      summary: Submit Argument
      description: Participant submits a debate argument.
      operationId: submit_argument_api_participant_debate_argument_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArgumentRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: debate
  /api/participant/debate/upvote:
    post:
      tags:
      - debate
      summary: Upvote Argument
      description: Participant upvotes a debate argument.
      operationId: upvote_argument_api_participant_debate_upvote_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpvoteRequest'
        required: true
      responses:
        '204':
          description: Successful Response
      x-feature: debate
  /api/participant/debate/volunteer:
    post:
      tags:
      - debate
      summary: Volunteer Champion
      description: Participant volunteers as champion for their side.
      operationId: volunteer_champion_api_participant_debate_volunteer_post
      responses:
        '204':
          description: Successful Response
      x-feature: debate
  /api/{session_id}/host/debate:
